<!DOCTYPE html>
<html>
<head>
    <title>Add Follow-Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h2>Add Follow-Up Action</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <p class="flash {{ category }}">{{ message }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="post">
    Referral:
    <select name="referral_id" required>
        <option value="">Select Referral</option>
        {% for referral in referrals %}
            <option value="{{ referral.referral_id }}">
                #{{ referral.referral_id }} - {{ referral.referred_to }} ({{ referral.referral_date }})
            </option>
        {% endfor %}
    </select><br>
    Action Date: <input type="date" name="action_date" value="{{ today }}" required><br>
    Action Taken: <textarea name="action_taken" rows="3" required></textarea><br>
    Outcome: <textarea name="outcome" rows="3"></textarea><br>
    Next Review Date: <input type="date" name="next_review_date"><br><br>
    <button type="submit">Save Follow-Up</button>
</form>

<a href="/">Back</a>
</body>
</html>
