<!DOCTYPE html>
<html>
<head>
    <title>Create Referral</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>📤 Create External Referral</h2>
        <p style="text-align:center; color:#666;">
            Refer a student to external support services
        </p>
    </div>

    <div class="card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">

            <label>Student</label>
            <select name="student_id" required>
                <option value="">Select Student</option>
                {% for student in students %}
                    <option value="{{ student.student_id }}">{{ student.full_name }}</option>
                {% endfor %}
            </select>

            <label>Counselor</label>
            <select name="counselor_id" required>
                <option value="">Select Counselor</option>
                {% for counselor in counselors %}
                    <option value="{{ counselor.counselor_id }}">{{ counselor.full_name }}</option>
                {% endfor %}
            </select>

            <label>Referred To</label>
            <input type="text" name="referred_to" placeholder="Hospital / NGO / Specialist" required>

            <label>Reason for Referral</label>
            <textarea name="reason" rows="3" required></textarea>

            <label>Referral Date</label>
            <input type="date" name="referral_date" required>

            <label>Status</label>
            <select name="status" required>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
            </select>

            <button type="submit" style="margin-top:15px;">📨 Save Referral</button>

        </form>
    </div>

    <div style="text-align:center;">
        <a class="menu-btn secondary" href="/">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
