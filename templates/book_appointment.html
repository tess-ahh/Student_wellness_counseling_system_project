<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>📅 Book Counseling Appointment</h2>
        <p style="text-align:center; color:#666;">
            Schedule a counseling session for a student
        </p>
    </div>

    <div class="card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">

            <label>Appointment Date</label>
            <input type="date" name="date" required>

            <label>Appointment Time</label>
            <input type="time" name="time" required>

            <label>Student</label>
            <select name="student_id" required>
                <option value="">Select Student</option>
                {% for student in students %}
                    <option value="{{ student.student_id }}">{{ student.full_name }}</option>
                {% endfor %}
            </select>

            <label>Counselor</label>
            <select name="counselor_id" required>
                <option value="">Select Counselor</option>
                {% for counselor in counselors %}
                    <option value="{{ counselor.counselor_id }}">{{ counselor.full_name }}</option>
                {% endfor %}
            </select>

            <button type="submit" style="margin-top:15px;">📌 Confirm Appointment</button>

        </form>
    </div>

    <div style="text-align:center;">
        <a class="menu-btn secondary" href="/">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
