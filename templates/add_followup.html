<!DOCTYPE html>
<html>
<head>
    <title>Add Follow-Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>🔁 Add Follow-Up Action</h2>
        <p style="text-align:center; color:#666;">
            Record follow-up actions and outcomes for active referrals
        </p>
    </div>

    <div class="card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">

            <label>Referral</label>
            <select name="referral_id" required>
                <option value="">Select Referral</option>
                {% for referral in referrals %}
                    <option value="{{ referral.referral_id }}">
                        #{{ referral.referral_id }} - {{ referral.referred_to }} ({{ referral.referral_date }})
                    </option>
                {% endfor %}
            </select>

            <label>Action Date</label>
            <input type="date" name="action_date" value="{{ today }}" required>

            <label>Action Taken</label>
            <textarea name="action_taken" rows="3" placeholder="Describe the action taken" required></textarea>

            <label>Outcome</label>
            <textarea name="outcome" rows="3" placeholder="Describe the outcome or current status"></textarea>

            <label>Next Review Date</label>
            <input type="date" name="next_review_date">

            <button type="submit" style="margin-top:15px;">💾 Save Follow-Up</button>

        </form>
    </div>

    <div style="text-align:center;">
        <a class="menu-btn secondary" href="/">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
