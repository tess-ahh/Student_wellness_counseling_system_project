<!DOCTYPE html>
<html>
<head>
    <title>Submit Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>🗣 Anonymous Feedback</h2>
        <p style="text-align:center; color:#666;">
            Your feedback helps us improve counseling services
        </p>
    </div>

    <div class="card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">

            <label>Student (for anonymous token)</label>
            <select name="student_id" required>
                <option value="">Select Student</option>
                {% for student in students %}
                    <option value="{{ student.student_id }}">{{ student.full_name }}</option>
                {% endfor %}
            </select>

            <label>Rating</label>
            <select name="rating" required>
                <option value="5">5 – Excellent</option>
                <option value="4">4 – Good</option>
                <option value="3">3 – Fair</option>
                <option value="2">2 – Poor</option>
                <option value="1">1 – Very Poor</option>
            </select>

            <label>Comments</label>
            <textarea name="comments" rows="4" placeholder="Optional comments"></textarea>

            <button type="submit" style="margin-top:15px;">✅ Submit Feedback</button>

        </form>
    </div>

    <div style="text-align:center;">
        <a class="menu-btn secondary" href="/">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
